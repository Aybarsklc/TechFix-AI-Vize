    <script>
        // 60 Adet Kurumsal Saha Hata Kodu Veri Tabanı
        const vizeHataKutuphanesi = {
            "50.4": { baslik: "HP LaserJet - 50.4 Fuser Isıtıcı Hatası", cozum: "1. Cihazı kapatıp 15 dakika soğumasını bekleyin.\n2. Arka kapağı açarak Fuser ünitesinin voltaj bağlantılarını ve termistör değerlerini kontrol edin.\n3. Güç kaynağının stabil olduğundan ve doğrudan prize takılı olduğundan emin olun.\n4. Hata devam ederse Fuser ünitesini yenisiyle değiştirin.", parca: "HP Fuser Assembly (Isıtıcı Ünite)" },
            "59.F0": { baslik: "HP LaserJet - 59.F0 Transfer Belt Sürücü Hatası", cozum: "1. ITM ünitesini yerinden çıkarıp mekanik dişlilerini kontrol edin.\n2. Sağ taraftaki transfer belt motor soketlerinin tam oturduğundan emin olun.\n3. Cihazı sensör test moduna alarak fuser tahrik motorunu manuel olarak tetikleyin.\n4. Sıkışma yaratan mekanik bir parça yoksa motor değişimi uygulayın.", parca: "ITM Drive Motor / Transfer Belt" },
            "005": { baslik: "ATM / Sistem - 005 Banka İletişim Kesintisi", cozum: "1. ATM içi switch ve harici Cisco/Wincor modem üzerindeki WAN/LAN ışıklarını kontrol edin.\n2. IP havuzunun düşüp düşmediğini doğrulamak için merkeze ping testi gönderin.\n3. Fiziksel hatta sorun yoksa, şube içi ağ kablolarını kontrol edip 2. Seviye Ağ Operasyon biriminden port resetlemesi talep edin.", parca: "Network Switch / Ethernet Gateway" },
            "79": { baslik: "HP Enterprise - 79 Kritik Firmware Hatası", cozum: "1. Yazıcının tüm ağ bağlantılarını kesin ve cihazı yeniden başlatın.\n2. Kuyrukta bekleyen bozuk yazdırma işlerini temizleyin.\n3. Hata devam ederse pre-boot menüsünden Firmware Flash işlemi yapın.", parca: "Formatter Board (Anakart Flash)" },
            "13.00.00": { baslik: "HP LaserJet - 13.00.00 Genel Kağıt Sıkışma Hatası", cozum: "1. Kağıt yolundaki tüm tepsileri ve arka kapağı açıp sıkışan kağıt parçalarını cımbız yardımıyla temizleyin.\n2. Patenleri alkollü solüsyon ile temizleyerek aşınma durumunu inceleyin.\n3. Kağıt geçiş sensör bayrakçıklarının mekanik olarak serbest hareket ettiğini elinizle kontrol edin.", parca: "Paper Pickup Roller / Kağıt Sensörü" },
            "57.00.03": { baslik: "HP LaserJet - 57.00.03 Anakart Soğutma Fanı Arızası", cozum: "1. Cihazın sağ yan kapağını sökerek ana kart soğutma fanının (FM1) dönmesini engelleyen toz veya kablo blokajı olup olmadığına bakın.\n2. Fanın güç soketini söküp multimetre ile 24V voltaj kontrolü yapın.\n3. Voltaj gelmesine rağmen dönmeyen fanı değiştirin.", parca: "Sub-Thermistor Cooling Fan (FM1)" },
            "182": { baslik: "ATM / Wincor CMD - 182 Nakit Çıkış (Dispenser) Sıkışma Hatası", cozum: "1. Dispenser mekanizmasını (CMD modülü) rayları üzerinde dışarı çekin.\n2. Çıkış yuvasındaki (Shutter) veya taşıma bantlarındaki yırtık/sıkışmış banknotları fiziksel olarak temizleyin.\n3. Çıkış sensörlerinin üzerindeki tozları kuru hava spreyi ile temizleyin.\n4. Sistem üzerinden Dispenser Reset komutu gönderin.", parca: "CMD Shutter Module / Transport Belt" },
            "114": { baslik: "ATM / Wincor IDCU - 114 Motorlu Kart Okuyucu Blokajı", cozum: "1. Kart okuyucu giriş ağzındaki Anti-Skimming cihazını kontrol edin ve yabancı cisim olup olmadığına bakın.\n2. Modülün arkasındaki motor tahrik kayışının gerginliğini ve sağlamlığını inceleyin.\n3. Temizlik kartı yardımıyla okuyucu manyetik kafa og çip pinlerini solüsyonla temizleyin.", parca: "IDCU Card Reader Head / Drive Belt" },
            "BGP-DOWN": { baslik: "Cisco Router - BGP Protokolü / Merkez Bağlantı Kesintisi", cozum: "1. Cisco router terminaline bağlanarak 'show ip bgp summary' komutuyla komşuluk durumunu kontrol edin.\n2. 'State' kısmında Active/Idle görüyorsanız, VPN/IPSec tünel bacaklarının durumunu kontrol edin.\n3. WAN arayüzüne girip 'shutdown' ve ardından 'no shutdown' komutlarıyla portu resetleyin.", parca: "Cisco WAN Interface / SFP Module" },
            "41.03.02": { baslik: "HP LaserJet - 41.03.02 Medya Boyutu Algılama Hatası", cozum: "1. Tepsiye koyulan kağıtların kılavuz mandallarını tam sıkıştırın.\n2. Tepsinin arka kısmında bulunan boyut algılama switch kartını kontrol edin.\n3. Sensör kontaklarında oksitlenme varsa kontak sprey sıkın.", parca: "Paper Size Sensor Assembly" },
            "002": { baslik: "ATM / Wincor EPP - 002 Güvenli Şifre Klavyesi İletişim Hatası", cozum: "1. ATM PC arkasındaki EPP USB/Seri kablo bağlantısını söküp temizleyerek tekrar takın.\n2. Donanım sürücüsünü yeniden yükleyin.\n3. Tamamen kilitlenen veya tamper moduna düşen klavyeyi merkezden yeni anahtar yükleyerek resetleyin.", parca: "EPP V6 Encryption Pinpad" },
            "152": { baslik: "ATM / Journal Printer - 152 Makbuz Yazıcı Sıkışması", cozum: "1. Journal rulo kağıt haznesini açın, sıkışmış veya katlanmış termal kağıtları temizleyin.\n2. Otomatik kesici bıçağın mekanik yuvasına geri çekilip çekilmediğini elinizle kontrol edin.\n3. Termal kafa üzerindeki rulo baskı milini temizleyin.", parca: "Thermal Receipt Cutter / Paper Sensor" },
            "30.01.44": { baslik: "HP Enterprise - 30.01.44 ADF Tarayıcı Kalibrasyon Arızası", cozum: "1. Üst doküman besleyici (ADF) cam şeridini mikrofiber bez ve izopropil alkol ile lekesiz temizleyin.\n2. Tarayıcı optik lamba mekanizmasının taşıyıcı raylar üzerinde serbest kaydığından emin olun.\n3. Optik okuyucu CCD sensör bloğu arızalı ise üst komple tarayıcıyı değiştirin.", parca: "ADF Scanner Flat Cable / CCD Optic Bar" },
            "HIGH-CPU": { baslik: "Cisco Router - %100 CPU Limit Aşımı / Aşırı Yük Arızası", cozum: "1. Terminale bağlanıp 'show processes cpu sorted' komutu ile işlemciyi en çok yoran süreci bulun.\n2. 'show interfaces' ile paket girdi-çıktı oranlarını inceleyin.\n3. CPU'yu korumak amacıyla gereksiz debug loglama süreçlerini kapatın.", parca: "Cisco Core Engine / RAM Module" },
            "LOOP-DETECT": { baslik: "Network Switch - Katman 2 Döngü (STP Loop) Hatası", cozum: "1. Switch üzerindeki tüm port LED'lerinin aynı anda aşırı hızlı yanıp söndüğünü doğrulayın.\n2. Switch konsoluna bağlanıp 'show spanning-tree blockedports' komutunu çalıştırın.\n3. Hatalı ring kablosunu fiziksel olarak sökün.", parca: "Switch Firmware / STP Configuration" },
            "009": { baslik: "ATM / Wincor IDCU - 009 Kart Giriş Kapağı Mekanik Arızası", cozum: "1. Mekanik Shutter kapağının yayını ve dişlilerini kontrol edin.\n2. Kapak açma motorunu tetikleyen mikro-sensörün kontak durumunu ölçün.\n3. IDCU modül test yazılımından kapak açma/kapama döngü testini çalıştırın.", parca: "IDCU Shutter Mechanical Gate" },
            "10.00.00": { baslik: "HP LaserJet - 10.00.00 Siyah Toner Sarf Malzemesi Hatası", cozum: "1. Siyah toner kartuşunu çıkarıp çip kontaklarını temizleyin.\n2. Toneri sallayıp yerine tam oturtun.", parca: "Black Toner Cartridge Chip" },
            "10.23.60": { baslik: "HP LaserJet - 10.23.60 Atık Toner Kutusu Dolu Hatası", cozum: "1. Atık toner toplama ünitesini yerinden çıkarın.\n2. Optik doluluk sensör penceresini temiz bezle silin.\n3. Kutu tamamen doluysa yenisiyle değiştirin.", parca: "Waste Toner Collection Unit" },
            "32.1C.05": { baslik: "HP LaserJet - 32.1C.05 Dahili Depolama NVRAM Hatası", cozum: "1. Cihazı kapatıp 30 saniye bekledikten sonra açılışta NVRAM initialization komutunu tetikleyin.\n2. Anakart üzerindeki flash bellek soketini kontrol edin.", parca: "Formatter Board NVRAM Flash" },
            "40.00.01": { baslik: "HP LaserJet - 40.00.01 USB Giriş / I/O İletişim Hatası", cozum: "1. Harici USB bağlantı kablosunu söküp doğrudan bilgisayara takın.\n2. Ön paneldeki USB portunun fiziksel pinlerinde ezilme olup olmadığını kontrol edin.", parca: "Formatter USB Port Board" },
            "41.02.00": { baslik: "HP LaserJet - 41.02.00 Dahili Motor Geçiş Hatası", cozum: "1. Ana tahrik motoru kablo soketlerini DC Controller üzerinden söküp tekrar takın.\n2. Dişli mekanizmasında kilitlenme kontrolü yapın.", parca: "Main Drum Drive Motor" },
            "51.00.10": { baslik: "HP LaserJet - 51.00.10 Lazer Tarayıcı (Laser/Scanner) Hatası", cozum: "1. Lazer ünitesinin kablo bağlantılarını kontrol edin.\n2. Lazer ayna motorunun dönmesini engelleyen tozları temizleyin.", parca: "Laser Scanner Assembly" },
            "52.00.00": { baslik: "HP LaserJet - 52.00.00 Lazer Poligon Motor Hız Hatası", cozum: "1. Poligon aynasının hedef hıza ulaşamadığını gösterir.\n2. Lazer ünitesi güç kablosundaki 12V beslemesini ölçün.", parca: "Scanner Polygon Motor" },
            "54.00.01": { baslik: "HP LaserJet - 54.00.01 Çevre Sensörü Hatası", cozum: "1. Cihazın iç sıcaklık ve nem değerlerini ölçen sensör yuvasını bulun.\n2. Tozlanmayı temizleyin.\n3. Şube içi ortam sıcaklığının standart limitlerde olmasını sağlayın.", parca: "Environment Sensor Unit" },
            "55.00.01": { baslik: "HP LaserJet - 55.00.01 DC Controller İletişim Hatası", cozum: "1. Formatter anakartı ile DC Controller kartı arasındaki ribbon şerit kabloyu söküp pinleri temizleyin.", parca: "Engine-to-Formatter Ribbon Cable" },
            "56.00.01": { baslik: "HP LaserJet - 56.00.01 Yanlış Çıkış Seçimi Donanım Hatası", cozum: "1. Çıkış tepsisi yönlendirme kapakçıklarının mekanik yayını kontrol edin.\n2. Solenoid kablo soketini kontrol edin.", parca: "Output Deflector Solenoid" },
            "58.00.04": { baslik: "HP LaserJet - 58.00.04 Alçak Gerilim Güç Kaynağı (LVPS) Hatası", cozum: "1. Şube priz voltajını ölçün (220V stabil olmalı).\n2. LVPS kartı üzerindeki sigortaları ve şişmiş kondansatörleri kontrol edin.", parca: "Low Voltage Power Supply (LVPS)" },
            "60.00.02": { baslik: "HP LaserJet - 60.00.02 Tepsi 2 Kaldırma Motoru Hatası", cozum: "1. Tepsi 2'deki kağıt kaldırma mekanizmasının dişlilerini inceleyin.\n2. Kağıt yükseklik algılama sensörünü temizleyin.", parca: "Tray 2 Lifter Drive Motor" },
            "62.00.00": { baslik: "HP LaserJet - 62.00.00 Dahili Sistem Belleği (RAM) Hatası", cozum: "1. Anakart üzerindeki RAM slotunu açın.\n2. RAM pinlerini silgi ile temizleyip yerine sıkıca oturtun.", parca: "DDR SO-DIMM Memory Module" },
            "65.00.01": { baslik: "HP LaserJet - 65.00.01 Çıkış Sensörü Hatası", cozum: "1. Fuser çıkışında bulunan kağıt çıkış sensörünün bayrakçığını kontrol edin.\n2. Sensör kartını kuru hava ile temizleyin.", parca: "Fuser Delivery Sensor Photo-Interrupter" },
            "66.00.15": { baslik: "HP LaserJet - 66.00.15 Harici Sonlandırıcı Bağlantı Hatası", cozum: "1. Yazıcıya bağlı ek harici zımba/katlama ünitesinin ara bağlantı kablosunu sökün.\n2. Finisher ünitesinin kendi güç kablosunu test edin.", parca: "Finisher Interface Cable" },
            "68.00.01": { baslik: "HP LaserJet - 68.00.01 Depolama Alanı Dolu / Kalıcı Bellek Hatası", cozum: "1. Yazıcı web arayüzüne bağlanarak eski log ve dökümanları silin.\n2. Pre-boot menüsünden disk formatlama veya disk temizleme komutunu çalıştırın.", parca: "Internal Solid State Drive (SSD)" },
            "80.00.01": { baslik: "HP Enterprise - 80.00.01 Gömülü Network Kartı Hatası", cozum: "1. Anakart üzerindeki entegre ethernet çipinin etrafındaki bileşenleri kontrol edin.\n2. Firmware güncellemesi yapın.", parca: "Embedded JetDirect Network Chip" },
            "99.00.01": { baslik: "HP Enterprise - 99.00.01 Eksik veya Bozuk İşletim Sistemi Hatası", cozum: "1. Yazıcının hard diskinin veya SSD'sinin bağlantısını kontrol edin.\n2. Pre-boot menüsüne girip temiz firmware kurulumu gerçekleştirin.", parca: "SATA Hard Disk Drive / Compact Flash" },
            "001": { baslik: "ATM / Sistem - 001 Ana Güç Kaynağı ve UPS Kesinti Hatası", cozum: "1. ATM kabini içindeki ana şalteri ve UPS durum ekranını kontrol edin.\n2. Akü voltajlarının 12V sınırının altına düşüp düşmediğini ölçün.", parca: "ATM Online UPS / Akü Grubu" },
            "003": { baslik: "ATM / Sistem - 003 Kasa Güvenlik Kilidi Alarmı", cozum: "1. Alt para kasası kapağının ve elektronik şifreli kilidin bağlantı kablolarını inceleyin.\n2. Sensör switch'inin fiziki temasını doğrulayın.", parca: "Safe Door Micro Switch / Elektronik Kilit" },
            "004": { baslik: "ATM / Sistem - 004 Alarm Yönetim Paneli Sensör Tetiklemesi", cozum: "1. Kabin içi darbe, ısı ve sismik sensörlerin durumunu alarm panelinden inceleyin.\n2. Sensör hassasiyet ayarını potansiyometreden kalibre edin.", parca: "Seismic/Heat Sensor Board" },
            "006": { baslik: "ATM / Sistem - 006 Depozito Ünitesi (BNA) Giriş Blokajı", cozum: "1. Para/Zarf kabul ünitesinin giriş ağzındaki mekanik paletleri kontrol edin.\n2. Optik tarayıcı camlarını silin.", parca: "BNA Note Acceptor Shutter" },
            "007": { baslik: "ATM / Sistem - 007 Kamera Güvenlik Sistemi / DVR Kayıt Hatası", cozum: "1. ATM PC arkasındaki USB kamera yakalama kartı sürücülerini kontrol edin.\n2. Üst kullanıcı kamerası ve para çıkış kamerası USB kablolarını resetleyin.", parca: "USB ATM Surveillance Camera" },
            "008": { baslik: "ATM / Sistem - 008 Barkod Okuyucu Modül Haberleşme Hatası", cozum: "1. Fatura ödeme barkod tarayıcı ünitesinin RS232/USB kablosunu kontrol edin.\n2. Tarayıcı lazer lensini optik temizleyici ile silin.", parca: "Barcode Scanner Module" },
            "010": { baslik: "ATM / Wincor - 010 Bozuk Para Verici Arızası", cozum: "1. Madeni para kanallarında sıkışan hatalı veya yabancı paraları ayıklayın.\n2. Bozuk para haznesi sensör soketlerini temizleyin.", parca: "Coin Dispenser Hopper Unit" },
            "101": { baslik: "ATM / Wincor CMD - 101 Kaset 1 Boş / Para Kalmadı Uyarısı", cozum: "1. 1 numaralı para kasetini çıkarıp içindeki banknotları kontrol edin.\n2. Kaset arkasındaki ağırlık plakasının ve switch tırnağının sağlamlığını doğrulayın.", parca: "Currency Cassette 1 Tırnağı" },
            "102": { baslik: "ATM / Wincor CMD - 102 Kaset 2 Kalibrasyon Hatası", cozum: "1. 2 numaralı kasetin banknot kalınlık ayar vidasını milimetrik kalibre edin.\n2. Kaset içi yay mekanizmasını yağlayın.", parca: "Cassette 2 Banknot Ayar Vidası" },
            "103": { baslik: "ATM / Wincor CMD - 103 Kaset 3 Red Kutusu Dolu", cozum: "1. ATM kasasında bulunan hatalı/şüpheli paraların toplandığı Red kutusunu çıkarın.\n2. İçindeki paraları boşaltıp kutu algılama sensörünü temizleyin.", parca: "Reject / Retract Box Module" },
            "104": { baslik: "ATM / Wincor CMD - 104 Vakum Dağıtıcı Hava Sızıntısı", cozum: "1. Paraları kasetten çekmeye yarayan vakum vantuzlarının yırtılıp yırtılmadığını kontrol edin.\n2. Kompresör hava hortumu bağlantı rekorlarını sıkıştırın.", parca: "Pneumatic Suction Cups / Hava Hortumu" },
            "110": { baslik: "ATM / Wincor IDCU - 110 Akıllı Kart İletişim EMV Hatası", cozum: "1. Kart okuyucunun akıllı çip okuma pinlerinde bükülme olup olmadığını kontrol edin.\n2. EMV parametre sürücülerini güncelleyin.", parca: "IDCU Chip Contact Pin Block" },
            "115": { baslik: "ATM / Wincor IDCU - 115 Manyetik Bant Okuyucu Kafa Hatası", cozum: "1. Kartın arkasındaki manyetik şeridi okuyan MSR kafasını temizlik kartı ile temizleyin.\n2. Kafa sinyal kablosunu test edin.", parca: "MSR Magnetic Read Head" },
            "120": { baslik: "ATM / Sistem - 120 Temassız Kart Okuyucu Modül Arızası", cozum: "1. Dış kabindeki NFC okuyucu panelin USB bağlantısını ATM PC üzerinden söküp farklı porta takın.\n2. NFC anten sinyal gücünü test edin.", parca: "NFC Reader Antenna Module" },
            "150": { baslik: "ATM / Receipt Printer - 150 Müşteri Makbuz Yazıcı Kağıt Bitti", cozum: "1. Makbuz termal rulo kağıdını yenisiyle değiştirin.\n2. Kağıdı siyah çizgili sensör yönüne dikkat ederek besleme yuvasına itin.", parca: "Thermal Receipt Paper Roll" },
            "151": { baslik: "ATM / Receipt Printer - 151 Yazıcı Kafa Aşırı Isınma Hatası", cozum: "1. Termal yazıcı kafanın çalışma sıcaklığının limitleri aştığını gösterir.\n2. ATM kapaklarını açıp modülü 10 dakika havalandırın.", parca: "Thermal Print Head Assembly" },
            "201": { baslik: "ATM / Şube - 201 Kabin İçi Isı Koruma / Klima Arızası", cozum: "1. ATM kabini arkasında bulunan harici klimanın filtrelerini ve gaz basıncını kontrol edin.\n2. Kabin içi sıcaklık termostat sensörünü test edin.", parca: "ATM Cabinet Cooling Fan / Klima" },
            "PING-FAIL": { baslik: "Cisco Router - PING / Gateway Yanıt Vermiyor Arızası", cozum: "1. Router terminalinden merkez gateway IP'sine ping atın.\n2. Paket kaybı varsa lokal switch ve router arasındaki Patch kabloyu test edin.\n3. ARP tablosunu temizleyin.", parca: "Cat6 Ethernet Patch Cable" },

        // Tab Değiştirme Fonksiyonu
        function switchTab(tabName) {
            currentTab = tabName;
            
            ['dashboard', 'manuals', 'profile'].forEach(tab => {
                const btn = document.getElementById(`btn-${tab}`);
                if (tab === tabName) {
                    btn.classList.remove('text-slate-500', 'hover:text-slate-300');
                    btn.classList.add('text-neon');
                } else {
                    btn.classList.remove('text-neon');
                    btn.classList.add('text-slate-500', 'hover:text-slate-300');
                }
            });
            
            renderPage();
        }

        // Hata Sorgulama Fonksiyonu
        function sorgulaHata() {
            const inputElement = document.getElementById("errorCodeInput");
            const resultArea = document.getElementById("resultArea");
            const resultTitle = document.getElementById("resultTitle");
            const resultContent = document.getElementById("resultContent");
            const resultPart = document.getElementById("resultPart");
            
            const kod = inputElement.value.trim().toUpperCase();

            if (kod === "") { alert("Lütfen bir hata kodu girin!"); return; }

            if (vizeHataKutuphanesi[kod]) {
                const data = vizeHataKutuphanesi[kod];
                resultTitle.innerText = data.baslik;
                resultContent.innerText = data.cozum;
                resultPart.innerText = data.parca;
                resultArea.classList.remove("hidden");
            } else {
                resultTitle.innerText = `Arıza Kodu: ${kod} (Genel Saha Teşhisi)`;
                resultContent.innerText = `Girilen '${kod}' kodu için spesifik bir kılavuz eşleşmesi bulunamadı.\n\n1. Cihazın güç bağlantılarını kesip statik elektriği boşaltın.\n2. Üretici dökümanlarından aratın.`;
                resultPart.innerText = "Manuel Kontrol Gerekli";
                resultArea.classList.remove("hidden");
            }
        }
